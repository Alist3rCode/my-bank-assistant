name: CD — Deploy to VPS

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      registry:  ${{ steps.registry.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      # ghcr.io requires fully lowercase image names; github.repository_owner
      # preserves original casing (e.g. "Alist3rCode"), so we normalise here.
      - name: Set lowercase registry
        id: registry
        run: |
          echo "value=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" \
            >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.value }}/bank-assistant
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.registry.outputs.value }}/bank-assistant-backend:${{ steps.meta.outputs.version }}
            ${{ steps.registry.outputs.value }}/bank-assistant-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.registry.outputs.value }}/bank-assistant-frontend:${{ steps.meta.outputs.version }}
            ${{ steps.registry.outputs.value }}/bank-assistant-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    # Le runner tourne directement sur le serveur — pas de SSH entrant requis.
    # Prérequis : runner installé et enregistré sur le dépôt via
    #   Settings → Actions → Runners → New self-hosted runner
    runs-on: self-hosted
    needs: build-push
    steps:
      - name: Pull latest code
        run: |
          cd /opt/bank-assistant
          git pull origin main

      - name: Deploy
        run: |
          cd /opt/bank-assistant
          ./deploy.sh --tag "${{ needs.build-push.outputs.image_tag }}"
