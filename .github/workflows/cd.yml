name: CD — Build & push Docker images

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # ghcr.io exige des noms d'image en minuscules ;
      # github.repository_owner préserve la casse d'origine.
      - name: Set lowercase registry
        id: registry
        run: |
          echo "value=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" \
            >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.value }}/bank-assistant
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.registry.outputs.value }}/bank-assistant-backend:${{ steps.meta.outputs.version }}
            ${{ steps.registry.outputs.value }}/bank-assistant-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.registry.outputs.value }}/bank-assistant-frontend:${{ steps.meta.outputs.version }}
            ${{ steps.registry.outputs.value }}/bank-assistant-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Images publiées sur GHCR 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.registry.outputs.value }}/bank-assistant-backend:${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.registry.outputs.value }}/bank-assistant-frontend:${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pour déployer sur le serveur :" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "./deploy.sh --tag ${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
