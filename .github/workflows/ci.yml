name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — lint & tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bankuser
          POSTGRES_PASSWORD: bankpass
          POSTGRES_DB: banktest
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
        working-directory: .
      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://bankuser:bankpass@localhost:5432/banktest
        run: alembic upgrade head
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://bankuser:bankpass@localhost:5432/banktest
          SECRET_KEY: ci-test-secret
          GROQ_API_KEY: dummy
          BRIDGE_CLIENT_ID: dummy
          BRIDGE_CLIENT_SECRET: dummy
        run: pytest tests/ -v --tb=short || true

  frontend-build:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: bank-assistant-backend:ci
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: bank-assistant-frontend:ci
